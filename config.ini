[DEFAULT]
# Automatic Phishing Detection System Configuration

[API]
# Flask Backend Configuration
HOST = localhost
PORT = 5001
DEBUG = False
FLASK_ENV = production
CORS_ORIGINS = *

[MODEL]
# ML Model Settings
MODEL_PATH = ../Phising/model.pkl
FEATURE_COLS_PATH = ../Phising/feature_cols.pkl
PHISHING_CONFIDENCE_THRESHOLD = 0.5

[DETECTION]
# Detection Rules
PHISHING_KEYWORDS = secure,account,update,login,verify,confirm,password
SUSPICIOUS_TLDS = .tk,.ml,.ga,.cf,.gq,.xyz,.top,.click
KNOWN_SAFE_DOMAINS = google.com,facebook.com,github.com,wikipedia.org,twitter.com
MIN_URL_LENGTH = 5
MAX_URL_LENGTH = 2048

[BROWSER_EXTENSION]
# Chrome/Firefox Extension Settings
API_CHECK_TIMEOUT = 5000
POPUP_AUTO_CLOSE_TIME = 5000
SHOW_POPUP_ON_PHISHING = true
SHOW_POPUP_ON_SAFE = false
TRACK_STATISTICS = true

[DESKTOP_APP]
# System Tray Application
ENABLE_SYSTEM_TRAY = true
AUTO_START_ON_BOOT = false
MINIMIZE_TO_TRAY = true
ENABLE_NOTIFICATIONS = true

[LOGGING]
# Application Logging
LOG_LEVEL = INFO
LOG_FILE = phishing_detector.log
LOG_MAX_SIZE = 10485760
LOG_BACKUP_COUNT = 5

[SECURITY]
# Security Settings
VALIDATE_HTTPS = false
ALLOW_IP_ADDRESSES = false
BLOCK_MALFORMED_URLS = true
CHECK_DNS_RECORDS = false
